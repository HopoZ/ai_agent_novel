name: Build Windows Electron Release

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - "requirements.txt"
      - "packaging/pyinstaller/**"
      - "webapp/backend/**"
      - "webapp/frontend/**"
      - "electron/**"
      - ".github/workflows/build-exe.yml"

jobs:
  build-windows-electron-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            webapp/frontend/package-lock.json
            electron/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend assets
        working-directory: webapp/frontend
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run build

      - name: Ensure packaged static directories exist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "webapp/static" | Out-Null
          New-Item -ItemType Directory -Force -Path "webapp/templates" | Out-Null

      - name: Build backend exe with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name novel-backend `
            packaging/pyinstaller/run_uvicorn.py `
            --paths . `
            --add-data "webapp/frontend/dist;webapp/frontend/dist" `
            --add-data "webapp/static;webapp/static" `
            --add-data "webapp/templates;webapp/templates" `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all starlette `
            --collect-all pydantic `
            --collect-submodules agents `
            --collect-submodules webapp

      - name: Copy backend exe into Electron resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "electron/resources/backend" | Out-Null
          Copy-Item -Force "dist/novel-backend.exe" "electron/resources/backend/novel-backend.exe"

      - name: Verify Electron project files
        shell: pwsh
        run: |
          $required = @(
            "electron/package.json",
            "electron/package-lock.json",
            "electron/electron.vite.config.ts",
            "electron/tsconfig.json",
            "electron/src/main/index.ts",
            "electron/src/preload/index.ts"
          )
          $missing = @()
          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing Electron files in repository: " + ($missing -join ", ") + ". Please commit electron project source files before running release build.")
            exit 1
          }

      - name: Sync Electron version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: electron
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $version) { throw "Invalid tag version." }
          npm version $version --no-git-tag-version --allow-same-version

      - name: Build Electron installer
        working-directory: electron
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run dist

      - name: Upload electron release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-release-windows
          path: |
            electron/release/*.exe
          if-no-files-found: error

      - name: Create release and upload electron assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            electron/release/*.exe
