name: Build Windows Backend EXE

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "requirements.txt"
      - "packaging/pyinstaller/**"
      - "webapp/backend/**"
      - "webapp/frontend/**"
      - ".github/workflows/build-backend-exe.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Build frontend assets
        working-directory: webapp/frontend
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure packaged static directories exist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "webapp/static" | Out-Null
          New-Item -ItemType Directory -Force -Path "webapp/templates" | Out-Null

      - name: Build novel-backend.exe
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name novel-backend `
            packaging/pyinstaller/run_uvicorn.py `
            --paths . `
            --add-data "webapp/frontend/dist;webapp/frontend/dist" `
            --add-data "webapp/static;webapp/static" `
            --add-data "webapp/templates;webapp/templates" `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all starlette `
            --collect-all pydantic `
            --collect-submodules agents `
            --collect-submodules webapp

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-backend-windows-exe
          path: dist/novel-backend.exe
          if-no-files-found: error

      - name: Upload exe to GitHub Release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/novel-backend.exe
